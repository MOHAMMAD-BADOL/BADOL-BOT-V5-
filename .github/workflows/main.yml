name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Create Dummy Files
      run: |
        echo '{}' > config.json
        echo '[]' > BADOL-Appstate.json
        mkdir -p BADOL-Main node_modules
        echo 'module.exports = function(api) {};' > BADOL-Main/badol.js
        echo 'module.exports = { error: function() {}, cmd: function() {}, autoBanner: function() {} };' > BADOL-Main/logger.js

    - name: Validate Syntax Without Install
      run: node --check index.js
